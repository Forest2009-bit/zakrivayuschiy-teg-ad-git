name: Tests

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # ← обновлено

      - name: Check if the repository is private
        if: github.event.repository.private  # ← убраны ${{ }}
        run: exit 1

      - name: Tests
        uses: Yandex-Practicum/test-project-action@v1
        with:
          project: 'zakrivayuschiy-teg-ad-git'  # ← точное имя проекта
